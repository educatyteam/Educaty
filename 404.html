<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>404 — страница не найдена · Educaty</title>
  <meta name="description" content="Кажется, мы её ещё не сгенерировали. Возвращайтесь на главную AI-школы Educaty." />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="assets/img/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --yellow:#ECF6A0;
      --yellow-deep:#DDE986;
      --cream:#FAF8EE;
      --ink:#0A0A0A;
      --line:rgba(10,10,10,.12);
      --muted:#5A5A55;
      --display:"Unbounded","Inter",system-ui,sans-serif;
      --body:"Inter",system-ui,-apple-system,Segoe UI,sans-serif;
    }
    *{box-sizing:border-box;min-width:0}
    html,body{margin:0;padding:0;max-width:100%}
    html{overflow-x:hidden}
    body{
      font-family:var(--body);color:var(--ink);background:var(--yellow);
      -webkit-font-smoothing:antialiased;
      min-height:100vh;display:flex;flex-direction:column;
      overflow-x:hidden;
    }

    /* topbar */
    .topbar{
      position:sticky;top:0;z-index:5;
      backdrop-filter:saturate(160%) blur(14px);
      background:rgba(250,248,238,.78);
      border-bottom:1px solid var(--line);
    }
    .topbar .inner{
      max-width:1280px;margin:0 auto;
      padding:0 clamp(20px,4vw,56px);
      display:flex;align-items:center;justify-content:space-between;
      height:72px;gap:18px;
    }
    .topbar .logo img{height:26px;width:auto}
    .topbar .btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:12px 18px;border-radius:999px;
      font-weight:600;font-size:14px;line-height:1;
      background:var(--ink);color:#fff;text-decoration:none;
    }
    .topbar .btn:hover{background:#222}

    /* hero */
    .hero{
      flex:1;position:relative;
      padding:clamp(60px,10vw,140px) clamp(20px,4vw,56px);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .hero::before{
      content:"";position:absolute;inset:auto -10% -40% auto;
      width:60%;height:80%;
      background:radial-gradient(closest-side,rgba(255,255,255,.5),transparent 70%);
      filter:blur(20px);pointer-events:none;
    }
    .hero::after{
      content:"";position:absolute;inset:-30% auto auto -15%;
      width:50%;height:60%;
      background:radial-gradient(closest-side,rgba(255,255,255,.4),transparent 70%);
      filter:blur(24px);pointer-events:none;
    }

    .wrap{
      position:relative;max-width:920px;width:100%;
      text-align:center;
    }
    .eyebrow{
      display:inline-flex;align-items:center;gap:10px;
      font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
      padding:8px 14px;border:1px solid var(--line);border-radius:999px;
      background:rgba(255,255,255,.55);backdrop-filter:blur(6px);
      margin-bottom:24px;
    }
    .eyebrow .dot{width:6px;height:6px;border-radius:999px;background:var(--ink)}

    h1{
      font-family:var(--display);font-weight:800;letter-spacing:-.025em;
      font-size:clamp(40px,7.2vw,108px);line-height:.95;
      margin:0;word-break:break-word;
    }
    h1 .accent{
      position:relative;display:inline-block;
      font-style:italic;font-weight:800;
      padding:0 .04em .22em;line-height:.95;max-width:100%;
    }
    h1 .accent svg{
      position:absolute;left:0;right:0;bottom:.02em;
      width:100%;height:.22em;
      display:block;overflow:visible;pointer-events:none;
    }
    h1 .accent svg path{
      stroke:var(--ink);stroke-width:6;stroke-linecap:round;fill:none;
      vector-effect:non-scaling-stroke;
    }

    .ctas{
      display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
      margin-top:36px;
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:18px 26px;border-radius:999px;
      font-weight:600;font-size:16px;line-height:1.2;text-decoration:none;
      transition:transform .2s ease, background .2s ease, color .2s ease;
    }
    .btn-primary{background:var(--ink);color:#fff}
    .btn-primary:hover{background:#222;transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
    .btn-ghost:hover{background:var(--ink);color:#fff}
    .btn .arrow{
      width:26px;height:26px;border-radius:999px;display:inline-grid;place-items:center;
      background:var(--yellow);color:var(--ink);font-size:14px;font-weight:700;
    }

    /* footer mini */
    .foot{
      padding:24px clamp(20px,4vw,56px);
      font-size:13px;color:rgba(10,10,10,.5);text-align:center;
      border-top:1px solid rgba(10,10,10,.06);
    }

    @media (max-width:520px){
      .ctas{flex-direction:column;align-items:stretch}
      .ctas .btn{width:100%}
      .topbar .btn{padding:10px 14px;font-size:13px}
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="inner">
      <a class="logo" href="/" aria-label="Educaty">
        <img src="assets/img/logo.png" alt="Educaty" />
      </a>
      <a class="btn" href="/#masterclass">На главную</a>
    </div>
  </header>

  <main class="hero">
    <div class="wrap">
      <h1>Ууупс… кажется <span class="accent">этой страницы нет<svg viewBox="0 0 200 20" preserveAspectRatio="none" aria-hidden="true"><path d="M2 12 C 20 4, 40 18, 60 10 S 100 4, 120 12 S 160 18, 198 8"/></svg></span></h1>

      <div class="ctas">
        <a class="btn btn-primary" href="/#masterclass">
          Записаться на мастер-класс
          <span class="arrow">→</span>
        </a>
        <a class="btn btn-ghost" href="/">На главную</a>
      </div>
    </div>
  </main>

  <div class="foot">
    © 2026 Educaty · AI-школа в Санкт-Петербурге · hello@educaty.com
  </div>

</body>
</html>
